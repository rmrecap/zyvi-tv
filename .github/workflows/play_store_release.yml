name: Play Store Production Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build & Deploy Android App Bundle
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: zyvi_tv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          echo "storeFile=upload-keystore.jks" > android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      - name: Build release App Bundle
        run: |
          flutter build appbundle --release \
            --android-skip-build-dependency-validation \
            --dart-define=FLUTTER_APP_FLAVOR=production

      - name: Sign App Bundle (manual check)
        run: |
          jarsigner -verify -verbose \
            build/app/outputs/bundle/release/app-release.aab \
            2>&1 | head -20

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: zyvi_tv/build/app/outputs/bundle/release/app-release.aab
          retention-days: 7

      - name: Publish to Google Play (internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.zyvitv.app
          releaseFiles: zyvi_tv/build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          whatsNewDirectory: whatsnew/
