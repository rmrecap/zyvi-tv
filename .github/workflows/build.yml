name: Zyvi TV Build Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  analyze-test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: zyvi_tv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Run static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test

  build-android:
    name: Android Release Build
    needs: analyze-test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: zyvi_tv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zyvi-tv-android-apk
          path: zyvi_tv/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    name: iOS Release Build
    needs: analyze-test
    runs-on: macos-latest

    defaults:
      run:
        working-directory: zyvi_tv

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS release (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: zyvi-tv-ios-bundle
          path: zyvi_tv/build/ios/iphoneos
